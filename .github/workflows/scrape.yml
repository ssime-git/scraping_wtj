name: Scrape WTTJ

on:
  schedule:
    - cron: "0 7 * * *"  # daily at 7am UTC
  workflow_dispatch:

concurrency:
  group: scrape-wttj
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: [self-hosted, linux, x64, wttj]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Show runner context
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"

      - name: Validate HF secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          WTTJ_EMAIL: ${{ secrets.WTTJ_EMAIL }}
          WTTJ_PASSWORD: ${{ secrets.WTTJ_PASSWORD }}
        run: |
          test -n "$HF_TOKEN" || (echo "::error::Missing GitHub secret HF_TOKEN" && exit 1)
          test -n "$HF_DATASET_REPO" || (echo "::error::Missing GitHub secret HF_DATASET_REPO" && exit 1)
          test -n "$WTTJ_EMAIL" || (echo "::error::Missing GitHub secret WTTJ_EMAIL" && exit 1)
          test -n "$WTTJ_PASSWORD" || (echo "::error::Missing GitHub secret WTTJ_PASSWORD" && exit 1)

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --package wttj-scraper --extra hf

      - name: Restore prior dataset state
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          mkdir -p data
          uv run --package wttj-scraper --extra hf python - <<'PY'
          import os
          import shutil

          from huggingface_hub import hf_hub_download

          for filename in ("jobs.parquet",):
              try:
                  path = hf_hub_download(
                      repo_id=os.environ["HF_DATASET_REPO"],
                      filename=filename,
                      repo_type="dataset",
                      token=os.environ["HF_TOKEN"],
                  )
              except Exception as exc:
                  print(f"Skipping {filename}: {exc}")
                  continue

              target = os.path.join("data", filename)
              shutil.copyfile(path, target)
              print(f"Restored {filename} -> {target}")
          PY

      - name: Install Playwright
        run: uv run playwright install chromium

      - name: Run scraper
        id: scrape
        env:
          WTTJ_EMAIL: ${{ secrets.WTTJ_EMAIL }}
          WTTJ_PASSWORD: ${{ secrets.WTTJ_PASSWORD }}
          WTTJ_MATCHES_CONFIG: config/wttj_matches.yaml
          DATA_DIR: data
          WTTJ_DEBUG_DIR: artifacts/wttj-debug
        run: uv run python scripts/scrape_matches_to_parquet.py

      - name: Upload WTTJ debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wttj-debug-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: ignore

      - name: Upload parquet to HF Dataset
        if: success()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          DATA_DIR: data
        run: uv run --package wttj-scraper --extra hf python scripts/upload_parquet_to_hf.py
