[project]
name = "wttj-scraper"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "playwright>=1.40",
    "wttj-models",
]

[tool.uv.sources]
wttj-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/wttj_scraper"]
