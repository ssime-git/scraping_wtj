[project]
name = "wttj-app"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "streamlit>=1.44",
    "pandas>=2.0",
    "pyarrow>=16.0",
    "huggingface_hub>=0.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/wttj_app"]
