[project]
name = "wttj-cli"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = ["wttj-scraper"]

[project.scripts]
wttj = "wttj_cli.main:main"

[tool.uv.sources]
wttj-scraper = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/wttj_cli"]
